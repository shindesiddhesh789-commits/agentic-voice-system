<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NVIDIA Nemotron Voice Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @keyframes viz-bounce {
      0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
      50% { transform: scaleY(1); opacity: 1; }
    }
    .viz-bar { animation: viz-bounce 1s infinite ease-in-out; }
    .viz-bar:nth-child(1) { animation-delay: 0ms; }
    .viz-bar:nth-child(2) { animation-delay: 100ms; }
    .viz-bar:nth-child(3) { animation-delay: 200ms; }
    .viz-bar:nth-child(4) { animation-delay: 300ms; }

    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fade-in-up 0.3s ease-out forwards; }

    @keyframes slide-in-right {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }
    .animate-slide-in-right { animation: slide-in-right 0.3s ease-out forwards; }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans overflow-hidden h-screen flex flex-col">

  <!-- Header -->
  <header class="flex items-center justify-between p-4 bg-slate-800 border-b border-slate-700 shadow-md z-10 shrink-0">
    <div class="flex items-center space-x-2">
      <div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center">
        <i data-lucide="cpu" class="w-5 h-5 text-slate-900"></i>
      </div>
      <h1 class="text-xl font-bold tracking-tight">Nemotron Agent</h1>
    </div>
    
    <div class="flex items-center space-x-4">
      <button id="extract-btn" class="flex items-center space-x-2 px-3 py-1.5 bg-indigo-600/20 text-indigo-400 hover:bg-indigo-600/30 hover:text-indigo-300 rounded-lg transition-colors text-sm font-medium border border-indigo-500/30 disabled:opacity-50">
        <span id="extract-icon-container"><i data-lucide="sparkles" class="w-4 h-4"></i></span>
        <span class="hidden sm:inline">✨ Extract Tasks</span>
      </button>
      
      <div class="flex items-center space-x-2 min-w-[120px] justify-end">
        <i id="status-processing-icon" data-lucide="loader-2" class="w-4 h-4 animate-spin text-green-400 hidden"></i>
        <i id="status-speaking-icon" data-lucide="volume-2" class="w-4 h-4 animate-pulse text-green-400 hidden"></i>
        <span id="status-text" class="text-sm font-medium text-slate-400">Ready</span>
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden relative">
    
    <!-- Main Chat Area -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 flex flex-col" id="chat-container">
      
      <!-- Error Notice -->
      <div id="error-container" class="hidden items-center p-4 mb-4 text-sm text-red-400 rounded-lg bg-red-900/20 border border-red-800 shrink-0" role="alert">
        <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0 mr-2"></i>
        <span><span class="font-medium">Notice:</span> <span id="error-text"></span></span>
      </div>

      <div class="max-w-3xl mx-auto space-y-6 w-full pb-20">
        <div id="messages-list" class="space-y-6"></div>

        <div id="live-transcript-container" class="hidden justify-end opacity-70 transition-opacity duration-300">
           <div class="flex max-w-[85%] flex-row-reverse items-end gap-2">
             <div class="flex-shrink-0 w-8 h-8 rounded-full bg-slate-600 flex items-center justify-center">
                <i data-lucide="user" class="w-4 h-4 text-white"></i>
              </div>
              <div class="p-4 rounded-2xl bg-slate-700/50 text-white rounded-br-sm border border-slate-600/30">
                <p class="italic"><span id="live-transcript-text"></span> <span class="animate-pulse">...</span></p>
              </div>
           </div>
        </div>

        <div id="smart-replies-container" class="hidden flex-wrap gap-2 justify-end pt-4 animate-fade-in-up"></div>
        
        <div id="generating-replies-indicator" class="hidden justify-end pt-4 opacity-50">
          <span class="text-xs flex items-center gap-1 text-slate-400">
            <i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i> Generating suggestions...
          </span>
        </div>
        
        <div id="chat-bottom-anchor"></div>
      </div>
    </main>

    <!-- Task Sidebar -->
    <aside id="task-sidebar" class="hidden w-80 bg-slate-800 border-l border-slate-700 flex-col animate-slide-in-right shrink-0 absolute right-0 top-0 bottom-0 z-20 md:relative shadow-2xl md:shadow-none">
      <div class="p-4 border-b border-slate-700 flex items-center justify-between shrink-0">
        <h2 class="font-semibold text-slate-200 flex items-center gap-2">
          <i data-lucide="list-todo" class="w-4 h-4 text-indigo-400"></i>
          Action Items
        </h2>
        <button id="close-sidebar-btn" class="text-slate-400 hover:text-slate-200">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
      <div id="tasks-list" class="p-4 overflow-y-auto flex-1 space-y-3"></div>
    </aside>
  </div>

  <!-- Control Area (Bottom) -->
  <footer class="p-4 md:p-6 bg-slate-800 border-t border-slate-700 flex flex-col items-center justify-center shrink-0 z-10">
    <div class="h-6 mb-3 flex items-center justify-center" id="footer-status-area">
      <div id="visualizer" class="hidden flex space-x-1">
        <div class="w-1.5 h-4 bg-green-500 rounded-full viz-bar"></div>
        <div class="w-1.5 h-6 bg-green-500 rounded-full viz-bar"></div>
        <div class="w-1.5 h-3 bg-green-500 rounded-full viz-bar"></div>
        <div class="w-1.5 h-5 bg-green-500 rounded-full viz-bar"></div>
      </div>
      <div id="processing-indicator" class="hidden text-green-400 flex items-center gap-2 text-sm font-medium">
        <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
        NVIDIA Nemotron is thinking...
      </div>
    </div>

    <div class="w-full max-w-3xl flex items-center gap-3">
      <button id="mic-btn" title="Toggle Voice Input" class="relative group flex-shrink-0 flex items-center justify-center w-12 h-12 md:w-14 md:h-14 rounded-full transition-all duration-300 shadow-xl bg-green-600 hover:bg-green-500 hover:-translate-y-0.5">
        <span id="mic-pulse" class="absolute inset-0 rounded-full bg-green-500 opacity-40 animate-ping hidden"></span>
        <div id="mic-icon-container" class="relative z-10 text-white">
          <i data-lucide="mic" class="w-6 h-6"></i>
        </div>
      </button>

      <form id="text-form" class="flex-1 flex items-center bg-slate-900 rounded-full border border-slate-600 px-4 py-2 focus-within:border-green-500 focus-within:ring-1 focus-within:ring-green-500 transition-all shadow-inner">
        <input 
          type="text" 
          id="text-input"
          placeholder="Type a message..."
          class="flex-1 bg-transparent text-slate-100 focus:outline-none disabled:opacity-50 placeholder-slate-400"
        />
        <button 
          type="submit" 
          id="send-btn"
          disabled
          class="ml-2 p-1.5 text-green-500 hover:text-green-400 disabled:text-slate-600 hover:bg-slate-800 rounded-full transition-colors"
        >
          <i data-lucide="send" class="w-4 h-4"></i>
        </button>
      </form>
    </div>
    
    <p id="footer-hint" class="mt-4 text-xs text-slate-500 font-medium">Speak or type your request</p>
  </footer>

  <script>
    // --- Configuration ---
    // IMPORTANT: Update this variable after you deploy your backend to Render!
    const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
        ? 'http://localhost:3000' 
        : ''; // <-- Example: 'https://my-backend.onrender.com'

    // --- State Management ---
    const state = {
      isListening: false,
      isProcessing: false,
      isSpeaking: false,
      micDisabled: false,
      transcript: '',
      messages: [
        { role: 'assistant', content: 'Hello! I am connected to the NVIDIA Llama-3.3-Nemotron model. You can ask me questions or tell me to turn on the lights.' }
      ],
      tasks: [],
      isExtracting: false,
      smartReplies: [],
      isGeneratingReplies: false,
      showTasks: false,
      error: ''
    };

    // --- DOM Elements ---
    const dom = {
      messagesList: document.getElementById('messages-list'),
      chatContainer: document.getElementById('chat-container'),
      bottomAnchor: document.getElementById('chat-bottom-anchor'),
      errorContainer: document.getElementById('error-container'),
      errorText: document.getElementById('error-text'),
      liveTranscriptContainer: document.getElementById('live-transcript-container'),
      liveTranscriptText: document.getElementById('live-transcript-text'),
      smartRepliesContainer: document.getElementById('smart-replies-container'),
      generatingRepliesIndicator: document.getElementById('generating-replies-indicator'),
      taskSidebar: document.getElementById('task-sidebar'),
      tasksList: document.getElementById('tasks-list'),
      closeSidebarBtn: document.getElementById('close-sidebar-btn'),
      extractBtn: document.getElementById('extract-btn'),
      extractIconContainer: document.getElementById('extract-icon-container'),
      statusProcessingIcon: document.getElementById('status-processing-icon'),
      statusSpeakingIcon: document.getElementById('status-speaking-icon'),
      statusText: document.getElementById('status-text'),
      visualizer: document.getElementById('visualizer'),
      processingIndicator: document.getElementById('processing-indicator'),
      micBtn: document.getElementById('mic-btn'),
      micPulse: document.getElementById('mic-pulse'),
      micIconContainer: document.getElementById('mic-icon-container'),
      textForm: document.getElementById('text-form'),
      textInput: document.getElementById('text-input'),
      sendBtn: document.getElementById('send-btn'),
      footerHint: document.getElementById('footer-hint')
    };

    // --- Speech Recognition Setup ---
    let recognition = null;
    const synth = window.speechSynthesis;

    function initSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      
      if (!SpeechRecognition) {
        state.micDisabled = true;
        showError("Your browser doesn't support the Web Speech API. Please use the text input.");
        updateUI();
        return;
      }

      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = 'en-US';

      recognition.onstart = () => {
        state.isListening = true;
        showError('');
        if (synth.speaking) {
          synth.cancel(); // Stop AI from speaking if user interrupts
          state.isSpeaking = false;
        }
        updateUI();
      };

      recognition.onresult = (event) => {
        let currentTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          currentTranscript += event.results[i][0].transcript;
        }
        state.transcript = currentTranscript;
        updateUI();
      };

      recognition.onerror = (event) => {
        state.isListening = false;
        if (event.error === 'network' || event.error === 'not-allowed') {
          state.micDisabled = true;
          showError("Microphone access is blocked. Voice input disabled, but text chat works perfectly!");
        } else if (event.error !== 'no-speech') {
          showError(`Speech Error: ${event.error}`);
        }
        updateUI();
      };

      recognition.onend = () => {
        state.isListening = false;
        updateUI();
        if (state.transcript.trim() !== '' && !state.isProcessing) {
          const textToSubmit = state.transcript.trim();
          state.transcript = '';
          handleUserSubmit(textToSubmit);
        }
      };
    }

    // --- Helper Functions ---
    let errorTimeout;
    function showError(msg) {
      state.error = msg;
      if (msg) {
        dom.errorText.textContent = msg;
        dom.errorContainer.classList.remove('hidden');
        dom.errorContainer.classList.add('flex');
        clearTimeout(errorTimeout);
        errorTimeout = setTimeout(() => {
          dom.errorContainer.classList.add('hidden');
          dom.errorContainer.classList.remove('flex');
        }, 6000);
      } else {
        dom.errorContainer.classList.add('hidden');
        dom.errorContainer.classList.remove('flex');
      }
    }

    function scrollToBottom() {
      setTimeout(() => {
        dom.bottomAnchor.scrollIntoView({ behavior: 'smooth' });
      }, 50);
    }

    // --- Action Handlers ---
    function toggleListen() {
      if (state.isListening) {
        recognition?.stop();
      } else {
        state.transcript = '';
        try {
          recognition?.start();
        } catch (e) {
          console.error("Recognition already started");
        }
      }
    }

    async function handleUserSubmit(text) {
      if (!text) return;
      if (!BACKEND_URL) {
        showError("BACKEND_URL is not configured in index.html!");
        return;
      }
      
      state.messages.push({ role: 'user', content: text });
      state.transcript = '';
      state.isProcessing = true;
      state.smartReplies = [];
      dom.textInput.value = '';
      
      updateUI();
      scrollToBottom();

      try {
        const response = await fetch(`${BACKEND_URL}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: state.messages }) 
        });

        if (!response.ok) throw new Error("Backend server error");
        const data = await response.json();
        
        state.messages.push({ role: 'assistant', content: data.reply });
        state.isProcessing = false;
        updateUI();
        scrollToBottom();
        
        speakText(data.reply);
        generateSmartReplies();

      } catch (err) {
        state.isProcessing = false;
        showError("Failed to connect to the backend server. Is it running?");
        updateUI();
      }
    }

    async function generateSmartReplies() {
      state.isGeneratingReplies = true;
      updateUI();
      scrollToBottom();

      try {
        const response = await fetch(`${BACKEND_URL}/api/smart-replies`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: state.messages })
        });

        const data = await response.json();
        state.smartReplies = data.replies || [];
      } catch (err) {
        console.error("Failed to generate smart replies");
      } finally {
        state.isGeneratingReplies = false;
        updateUI();
        scrollToBottom();
      }
    }

    async function extractActionItems() {
      if (state.messages.length < 2) return;
      
      state.isExtracting = true;
      state.showTasks = true;
      updateUI();

      try {
        const response = await fetch(`${BACKEND_URL}/api/extract-tasks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: state.messages })
        });

        const data = await response.json();
        state.tasks = data.tasks || [];
      } catch (err) {
        showError("Failed to extract action items.");
      } finally {
        state.isExtracting = false;
        updateUI();
      }
    }

    function speakText(text) {
      if (!synth) return;
      
      state.isSpeaking = true;
      updateUI();
      
      const utterance = new SpeechSynthesisUtterance(text);
      const voices = synth.getVoices();
      const preferredVoice = voices.find(v => v.name.includes('Google US English') || v.name.includes('Samantha')) || voices[0];
      if (preferredVoice) utterance.voice = preferredVoice;

      utterance.rate = 1.0;
      utterance.pitch = 1.0;

      utterance.onend = () => {
        state.isSpeaking = false;
        updateUI();
      };
      utterance.onerror = () => {
        state.isSpeaking = false;
        updateUI();
      };

      synth.speak(utterance);
    }

    // --- UI Rendering ---
    function updateUI() {
      renderMessages();
      renderTranscript();
      renderSmartReplies();
      renderSidebar();
      updateControls();
      lucide.createIcons();
    }

    function renderMessages() {
      dom.messagesList.innerHTML = state.messages.map(msg => {
        const isUser = msg.role === 'user';
        const justifyClass = isUser ? 'justify-end' : 'justify-start';
        const rowClass = isUser ? 'flex-row-reverse' : 'flex-row';
        const avatarBg = isUser ? 'bg-slate-600' : 'bg-green-600';
        const icon = isUser ? 'user' : 'cpu';
        const iconColor = isUser ? 'text-white' : 'text-slate-900';
        const bubbleStyles = isUser 
          ? 'bg-slate-700 text-white rounded-br-sm' 
          : 'bg-slate-800 border border-slate-700 text-slate-200 rounded-bl-sm shadow-sm';
        
        return `
          <div class="flex ${justifyClass}">
            <div class="flex max-w-[85%] ${rowClass} items-end gap-2">
              <div class="flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center ${avatarBg}">
                <i data-lucide="${icon}" class="w-4 h-4 ${iconColor}"></i>
              </div>
              <div class="p-4 rounded-2xl ${bubbleStyles}">
                <p class="leading-relaxed whitespace-pre-wrap">${msg.content}</p>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderTranscript() {
      if (state.isListening && state.transcript) {
        dom.liveTranscriptContainer.classList.remove('hidden');
        dom.liveTranscriptContainer.classList.add('flex');
        dom.liveTranscriptText.textContent = state.transcript;
      } else {
        dom.liveTranscriptContainer.classList.add('hidden');
        dom.liveTranscriptContainer.classList.remove('flex');
      }
    }

    function renderSmartReplies() {
      if (state.smartReplies.length > 0 && !state.isProcessing && !state.isListening) {
        dom.smartRepliesContainer.innerHTML = state.smartReplies.map(reply => `
          <button class="smart-reply-btn flex items-center gap-1.5 px-4 py-2 bg-slate-800 hover:bg-slate-700 text-green-400 text-sm rounded-full border border-slate-700 transition-all hover:border-green-500/50 shadow-sm" data-reply="${reply.replace(/"/g, '&quot;')}">
            <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
            ${reply}
          </button>
        `).join('');
        dom.smartRepliesContainer.classList.remove('hidden');
        dom.smartRepliesContainer.classList.add('flex');
        
        document.querySelectorAll('.smart-reply-btn').forEach(btn => {
          btn.addEventListener('click', (e) => handleUserSubmit(e.currentTarget.dataset.reply));
        });
      } else {
        dom.smartRepliesContainer.classList.add('hidden');
        dom.smartRepliesContainer.classList.remove('flex');
        dom.smartRepliesContainer.innerHTML = '';
      }

      if (state.isGeneratingReplies) {
        dom.generatingRepliesIndicator.classList.remove('hidden');
        dom.generatingRepliesIndicator.classList.add('flex');
      } else {
        dom.generatingRepliesIndicator.classList.add('hidden');
        dom.generatingRepliesIndicator.classList.remove('flex');
      }
    }

    function renderSidebar() {
      if (state.showTasks) {
        dom.taskSidebar.classList.remove('hidden');
        dom.taskSidebar.classList.add('flex');
        
        if (state.isExtracting) {
          dom.tasksList.innerHTML = `
            <div class="flex flex-col items-center justify-center h-40 text-slate-400 space-y-3">
              <i data-lucide="loader-2" class="w-6 h-6 animate-spin text-indigo-400"></i>
              <p class="text-sm">Analyzing conversation...</p>
            </div>
          `;
        } else if (state.tasks.length === 0) {
          dom.tasksList.innerHTML = `<p class="text-sm text-slate-400 text-center mt-10">No action items extracted yet.</p>`;
        } else {
          dom.tasksList.innerHTML = state.tasks.map(task => `
            <div class="flex items-start gap-3 p-3 bg-slate-900/50 rounded-lg border border-slate-700/50">
              <i data-lucide="check-square" class="w-4 h-4 text-slate-500 shrink-0 mt-0.5"></i>
              <p class="text-sm text-slate-300 leading-snug">${task}</p>
            </div>
          `).join('');
        }
      } else {
        dom.taskSidebar.classList.add('hidden');
        dom.taskSidebar.classList.remove('flex');
      }
    }

    function updateControls() {
      dom.extractBtn.disabled = state.isExtracting || state.messages.length < 2;
      dom.extractIconContainer.innerHTML = state.isExtracting 
        ? `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>` 
        : `<i data-lucide="sparkles" class="w-4 h-4"></i>`;

      if (state.isListening) dom.statusText.textContent = "Listening...";
      else if (state.isProcessing) dom.statusText.textContent = "Agent is thinking...";
      else if (state.isSpeaking) dom.statusText.textContent = "Speaking...";
      else dom.statusText.textContent = "Ready";

      dom.statusProcessingIcon.classList.toggle('hidden', !state.isProcessing);
      dom.statusSpeakingIcon.classList.toggle('hidden', !state.isSpeaking);

      dom.visualizer.classList.toggle('hidden', !state.isListening);
      dom.processingIndicator.classList.toggle('hidden', !state.isProcessing);
      dom.processingIndicator.classList.toggle('flex', state.isProcessing);

      dom.micBtn.disabled = state.isProcessing || state.micDisabled;
      
      if (state.micDisabled) {
         dom.micBtn.className = 'relative group flex-shrink-0 flex items-center justify-center w-12 h-12 md:w-14 md:h-14 rounded-full transition-all duration-300 shadow-xl bg-slate-700 opacity-50 cursor-not-allowed';
         dom.footerHint.textContent = 'Voice disabled due to permissions. Please type your request.';
      } else {
         dom.micBtn.className = `relative group flex-shrink-0 flex items-center justify-center w-12 h-12 md:w-14 md:h-14 rounded-full transition-all duration-300 shadow-xl ${
          state.isProcessing ? 'bg-slate-600 cursor-not-allowed opacity-50' : 
          state.isListening ? 'bg-red-500 hover:bg-red-600 scale-105' : 'bg-green-600 hover:bg-green-500 hover:-translate-y-0.5'
        }`;
        dom.footerHint.textContent = state.isListening ? 'Tap mic to stop recording' : 'Speak or type your request (e.g., "Turn on living room lights")';
      }
      
      dom.micPulse.classList.toggle('hidden', !state.isListening);
      dom.micIconContainer.innerHTML = state.isListening 
        ? `<i data-lucide="mic-off" class="w-6 h-6 text-white"></i>` 
        : (state.micDisabled ? `<i data-lucide="mic-off" class="w-6 h-6 text-slate-400"></i>` : `<i data-lucide="mic" class="w-6 h-6 text-white"></i>`);

      const inputHasText = dom.textInput.value.trim().length > 0;
      dom.textInput.disabled = state.isProcessing || state.isListening;
      dom.textInput.placeholder = state.isListening ? "Listening to your voice..." : "Type a message...";
      dom.sendBtn.disabled = !inputHasText || state.isProcessing || state.isListening;
    }

    // --- Event Listeners Setup ---
    function setupEventListeners() {
      dom.micBtn.addEventListener('click', toggleListen);
      
      dom.textForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = dom.textInput.value.trim();
        if (text && !state.isProcessing) {
          handleUserSubmit(text);
        }
      });

      dom.textInput.addEventListener('input', updateControls);
      dom.extractBtn.addEventListener('click', extractActionItems);
      
      dom.closeSidebarBtn.addEventListener('click', () => {
        state.showTasks = false;
        updateUI();
      });

      if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => {}; 
      }
    }

    // --- Initialization ---
    function init() {
      lucide.createIcons();
      initSpeechRecognition();
      setupEventListeners();
      updateUI();
    }

    // Run on load
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
